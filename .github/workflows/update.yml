name: Actualizar datos del Observatorio

# Se ejecuta solo cada día (y también se puede lanzar a mano).
on:
  schedule:
    - cron: '0 5 * * *'        # 05:00 UTC (~07:00 España) todos los días
  workflow_dispatch:            # botón "Run workflow" en la pestaña Actions

permissions:
  contents: write               # necesario para commitear los datos actualizados

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Descargar datos oficiales (INE · IECA · SEPE)
        run: python fetch_data.py

      - name: Guardar los datos si han cambiado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos: no hay nada que publicar."
          else
            git commit -m "Datos actualizados ($(date -u +%Y-%m-%d))"
            git push
          fi
